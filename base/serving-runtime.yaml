apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: ramalama-cuda-runtime
  annotations:
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/apiProtocol: REST
    opendatahub.io/template-name: ramalama-cuda-runtime
    opendatahub.io/template-display-name: RamaLama CUDA ServingRuntime for KServe
    openshift.io/display-name: RamaLama CUDA ServingRuntime for KServe
  labels:
    opendatahub.io/dashboard: "true"
    opendatahub.io/template-name: ramalama-cuda-runtime
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
  multiModel: false
  supportedModelFormats:
    - name: GGUF
      autoSelect: true
    - name: vLLM
      autoSelect: true
  containers:
    - name: kserve-container
      image: quay.io/ramalama/cuda:latest
      command:
        - /bin/sh
        - -c
      args:
        - |
          if [ -e /mnt/models/model.file ]; then
            MODEL_PATH=/mnt/models/model.file
          else
            MODEL_PATH=$(ls /mnt/models/*.gguf /mnt/models/*/*.gguf 2>/dev/null | head -1)
          fi
          [ -z "$MODEL_PATH" ] && MODEL_PATH=/mnt/models
          exec llama-server \
            --host :: \
            --port 8080 \
            --model "$MODEL_PATH" \
            -ngl ${LLAMA_NGL:-999} \
            --ctx-size ${LLAMA_CTX_SIZE:-4096} \
            --cache-reuse ${LLAMA_CACHE_REUSE:-256} \
            --threads ${LLAMA_THREADS:-4} \
            --reasoning-budget ${LLAMA_REASONING_BUDGET:-0} \
            --no-webui
      ports:
        - containerPort: 8080
          protocol: TCP
      startupProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 60
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        periodSeconds: 10
        timeoutSeconds: 5
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        periodSeconds: 30
        timeoutSeconds: 5
      securityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
        capabilities:
          drop: ["ALL"]
      env:
        - name: HOME
          value: /tmp
        - name: LLAMA_NGL
          value: "999"
        - name: LLAMA_CTX_SIZE
          value: "4096"
        - name: LLAMA_CACHE_REUSE
          value: "256"
        - name: LLAMA_THREADS
          value: "4"
        - name: LLAMA_REASONING_BUDGET
          value: "0"
